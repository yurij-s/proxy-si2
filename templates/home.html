<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: white;
            border-radius: 16px;
            padding: 48px;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            max-width: 480px;
            width: 90%;
        }

        .icone {
            font-size: 64px;
            margin-bottom: 24px;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 12px;
        }

        p {
            color: #555;
            font-size: 15px;
            margin-bottom: 24px;
        }

        .exemplo {
            background-color: #f0f2f5;
            color: #333;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-family: monospace;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icone">🌐</div>
        <h1>Proxy</h1>
        <p>Para acessar um site, digite a URL diretamente na barra de endereços:</p>
        <div class="exemplo">http://localhost:5000/https://wikipedia.org</div>
    </div>
</body>
</html>
